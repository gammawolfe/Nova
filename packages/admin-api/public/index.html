<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:">
  <title>Nova Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="nova-surface" x-data="novaApp()" x-init="init()">

  <!-- Kinetic ticker -->
  <div x-show="token" x-cloak style="position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,transparent,rgba(0,0,0,0.6),transparent);border-bottom:1px solid var(--border);overflow:hidden;height:28px;display:flex;align-items:center;z-index:50">
    <div style="display:flex;gap:48px;white-space:nowrap;animation:nova-scroll-x 24s linear infinite;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-secondary);padding-left:20px">
      <span>◉ nova admin</span>
      <span x-text="`${galaxies.length} galaxies`"></span>
      <span x-text="`${pendingAgents.length} pending`"></span>
      <span>◉ nova admin</span>
      <span x-text="`${galaxies.length} galaxies`"></span>
      <span x-text="`${pendingAgents.length} pending`"></span>
    </div>
  </div>

  <main class="nova-shell" :class="token && 'nova-shell--full'">

    <!-- LOGIN -->
    <section x-show="!token" x-cloak style="max-width:420px;margin-top:12vh">
      <div class="nova-eyebrow">◉ NOVA · ADMIN</div>
      <h1 class="nova-display" style="margin:12px 0 6px">Enter the console.</h1>
      <p class="nova-subtitle" style="margin-bottom:24px">Bearer token required. Stored in this tab only.</p>
      <form @submit.prevent="login()">
        <label class="nova-label" for="admintok">admin token</label>
        <input id="admintok" class="nova-input" :class="loginError ? 'is-error' : ''"
               type="password" autocomplete="off" x-model="loginValue" required>
        <p class="nova-error" x-show="loginError" x-text="loginError"></p>
        <div style="margin-top:20px">
          <button class="nova-cta" :disabled="loginBusy || !loginValue">
            <span x-text="loginBusy ? 'Probing…' : 'Enter'"></span>
            <span>→</span>
          </button>
        </div>
      </form>
    </section>

    <!-- AUTHENTICATED -->
    <section x-show="token" x-cloak class="nova-app" :class="sidebarCollapsed && 'is-sidebar-collapsed'">

      <aside class="nova-sidebar">
        <div class="nova-sidebar-brand">
          <div class="nova-eyebrow">◉ NOVA · ADMIN</div>
        </div>
        <nav class="nova-nav">
          <a href="#/"        class="nova-nav-item" :class="activeTab === 'galaxies' && 'is-active'">Galaxies</a>
          <a href="#/agents"  class="nova-nav-item" :class="activeTab === 'agents'   && 'is-active'">Agents</a>
          <a href="#/live"    class="nova-nav-item" :class="activeTab === 'live'     && 'is-active'">Live</a>
          <a href="#/audit"   class="nova-nav-item" :class="activeTab === 'audit'    && 'is-active'">Audit</a>
          <a href="#/settings" class="nova-nav-item" :class="activeTab === 'settings' && 'is-active'">Settings</a>
        </nav>
        <div class="nova-sidebar-spacer"></div>
        <button class="nova-sidebar-logout" @click="logout()">Log out</button>
      </aside>

      <button class="nova-sidebar-toggle" @click="toggleSidebar()" :aria-label="sidebarCollapsed ? 'Open sidebar' : 'Collapse sidebar'">
        <span x-text="sidebarCollapsed ? '▶' : '◀'"></span>
      </button>

      <section class="nova-main">

      <!-- HOME: Galaxies -->
      <template x-if="route.name === 'home'">
        <div>
          <h1 class="nova-display" style="margin:0 0 6px">Galaxies</h1>
          <p class="nova-subtitle" style="margin-bottom:24px" x-text="`${galaxies.length} tenant${galaxies.length === 1 ? '' : 's'} orbiting Nova`"></p>

          <div class="nova-stack">
            <template x-for="g in galaxies" :key="g.tenantId || g.slug">
              <a class="nova-glass nova-row" :href="`#/galaxy/${encodeURIComponent(g.slug)}`" style="text-decoration:none;color:inherit">
                <div class="nova-planet" :style="planetStyle(g.slug)"></div>
                <div style="flex:1">
                  <div style="font-weight:500;color:#fff" x-text="g.name"></div>
                  <div class="nova-mono" x-text="g.slug"></div>
                </div>
                <span class="nova-pill" :class="g.status === 'active' ? 'nova-pill-active' : 'nova-pill-danger'" x-text="g.status || 'unknown'"></span>
              </a>
            </template>
            <div x-show="galaxies.length === 0" class="nova-glass" style="text-align:center;color:var(--text-secondary)">
              No galaxies yet.
            </div>
          </div>

          <div style="margin-top:28px">
            <button class="nova-cta" @click="showCreateGalaxy = true">
              <span>+ New galaxy</span>
            </button>
          </div>
        </div>
      </template>

      <!-- GALAXY DETAIL -->
      <template x-if="route.name === 'galaxy'">
        <div>
          <a href="#/" class="nova-mono" style="color:var(--text-secondary);text-decoration:none">← All galaxies</a>

          <template x-if="currentGalaxy">
            <div style="margin-top:16px">
              <div class="nova-row" style="gap:20px;align-items:flex-start">
                <div class="nova-planet nova-planet-lg" :style="planetStyle(currentGalaxy.slug)" style="margin-top:8px"></div>
                <div style="flex:1">
                  <div class="nova-eyebrow" x-text="'◉ GALAXY · ' + currentGalaxy.slug"></div>
                  <h1 class="nova-display" style="font-size:40px;margin:6px 0" x-text="currentGalaxy.name"></h1>
                  <div class="nova-mono" x-text="currentGalaxy.did || '(no DID)'"></div>
                  <div class="nova-mono" style="margin-top:4px" x-text="`plan: ${currentGalaxy.plan} · messages/day: ${currentGalaxy.quotas?.messagesPerDay ?? '—'} · agents max: ${currentGalaxy.quotas?.agentsMax ?? '—'}`"></div>
                </div>
              </div>

              <h2 class="nova-display" style="font-size:24px;margin:40px 0 14px">Pending planets</h2>
              <div class="nova-stack">
                <template x-for="a in pendingAgents" :key="a.agentId">
                  <div class="nova-glass nova-row">
                    <div class="nova-planet" :style="planetStyle(a.agentId)"></div>
                    <div style="flex:1;min-width:0">
                      <div style="color:#fff;font-weight:500" x-text="a.agentId"></div>
                      <div class="nova-mono" style="overflow-wrap:anywhere" x-text="a.did || '(no DID)'"></div>
                      <div class="nova-mono" x-text="(a.skills || []).map(s => s.id).join(', ')"></div>
                    </div>
                    <span class="nova-pill nova-pill-pending">Pending</span>
                    <button class="nova-cta" style="padding:8px 14px" @click="approveTarget = a">Approve</button>
                    <button class="nova-input" style="width:auto;padding:8px 14px" @click="reject(a.agentId)">Reject</button>
                  </div>
                </template>
                <div x-show="pendingAgents.length === 0" class="nova-glass" style="text-align:center;color:var(--text-secondary)">
                  No pending planets. Issue an invite below.
                </div>
              </div>

              <h2 class="nova-display" style="font-size:24px;margin:40px 0 14px">Active planets</h2>
              <div class="nova-stack">
                <template x-for="a in activeAgents" :key="a.agentId">
                  <div class="nova-glass nova-row">
                    <div class="nova-planet" :style="planetStyle(a.agentId)"></div>
                    <div style="flex:1;min-width:0">
                      <div style="color:#fff;font-weight:500" x-text="a.name || a.agentId"></div>
                      <div class="nova-mono" x-text="a.agentId"></div>
                      <div class="nova-mono" style="overflow-wrap:anywhere" x-text="a.did || '(no DID)'"></div>
                      <div class="nova-mono" x-text="(a.skills || []).map(s => s.id).join(', ')"></div>
                    </div>
                    <span class="nova-pill nova-pill-active">Active</span>
                  </div>
                </template>
                <div x-show="activeAgents.length === 0" class="nova-glass" style="text-align:center;color:var(--text-secondary)">
                  No active planets yet. Invite one below.
                </div>
              </div>

              <h2 class="nova-display" style="font-size:24px;margin:40px 0 14px">Invites</h2>
              <button class="nova-cta" @click="showCreateInvite = true">
                <span>+ Issue invite</span>
              </button>
            </div>
          </template>

          <template x-if="!currentGalaxy">
            <div class="nova-glass" style="margin-top:32px;text-align:center;color:var(--text-secondary)">
              Galaxy not found.
            </div>
          </template>
        </div>
      </template>

      <!-- AGENTS -->
      <template x-if="route.name === 'agents'">
        <div>
          <div class="nova-eyebrow">◉ AGENTS</div>
          <h1 class="nova-display" style="font-size:40px;margin:6px 0">Agents</h1>
          <p class="nova-subtitle" style="margin-bottom:24px" x-text="`${allAgents.length} active ${allAgents.length === 1 ? 'agent' : 'agents'} across your galaxies`"></p>

          <div x-show="allAgentsLoading" class="nova-glass" style="text-align:center;color:var(--text-secondary)">
            Loading agents…
          </div>

          <div x-show="allAgentsError" class="nova-glass" style="text-align:center;color:var(--status-error)" x-text="allAgentsError"></div>

          <div x-show="!allAgentsLoading && !allAgentsError && allAgents.length === 0" class="nova-glass" style="text-align:center;color:var(--text-secondary)">
            No active agents yet. Approve a pending planet in a galaxy to see it here.
          </div>

          <div x-show="!allAgentsLoading && !allAgentsError && allAgents.length > 0" class="nova-agent-grid">
            <template x-for="a in allAgents" :key="a.agentId">
              <div class="nova-agent-card" role="button" tabindex="0"
                   @click="openAgentDetail(a.agentId)"
                   @keydown.enter="openAgentDetail(a.agentId)"
                   @keydown.space.prevent="openAgentDetail(a.agentId)">
                <div class="nova-row" style="margin-bottom:12px;align-items:flex-start">
                  <div class="nova-planet" :style="planetStyle(galaxySlug(a.tenantId))" style="margin-top:2px"></div>
                  <div style="flex:1;min-width:0">
                    <div style="color:#fff;font-weight:500" x-text="a.name"></div>
                    <div class="nova-mono" x-text="a.agentId"></div>
                    <div class="nova-mono" x-show="a.did" style="overflow-wrap:anywhere;margin-top:2px;font-size:10px" x-text="a.did"></div>
                  </div>
                  <a class="nova-pill" :href="`#/galaxy/${encodeURIComponent(galaxySlug(a.tenantId))}`"
                     style="color:var(--text-secondary);border-color:var(--border);text-decoration:none"
                     @click.stop x-text="galaxySlug(a.tenantId)"></a>
                </div>

                <p x-show="a.description" class="nova-subtitle" style="margin-bottom:12px" x-text="a.description"></p>

                <div x-show="a.skills && a.skills.length > 0" style="margin-bottom:12px">
                  <div style="display:flex;flex-wrap:wrap;gap:6px">
                    <template x-for="s in a.skills" :key="s.id">
                      <span class="nova-skill-chip" :title="s.description" x-text="s.name"></span>
                    </template>
                  </div>
                </div>

                <div class="nova-row" style="gap:14px;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:1px;align-items:center">
                  <span class="nova-capability-indicator" :class="a.capabilities?.streaming && 'is-on'">streaming</span>
                  <span class="nova-capability-indicator" :class="a.capabilities?.pushNotifications && 'is-on'">push</span>
                  <span class="nova-capability-indicator" :class="a.capabilities?.stateTransitionHistory && 'is-on'">history</span>
                  <span class="nova-pill"
                        :class="isBrokerAgent(a) ? 'nova-pill-active' : ''"
                        :style="!isBrokerAgent(a) ? 'color:var(--text-muted);border-color:var(--border)' : ''"
                        x-text="isBrokerAgent(a) ? 'broker' : 'direct'"></span>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- LIVE -->
      <template x-if="route.name === 'live'">
        <div class="nova-live-wrap">
          <div class="nova-row" style="justify-content:space-between;margin-bottom:24px;align-items:flex-start">
            <div>
              <div class="nova-eyebrow">◉ LIVE</div>
              <h1 class="nova-display" style="font-size:40px;margin:6px 0">Live</h1>
              <p class="nova-subtitle" x-text="`${allAgents.length} ${allAgents.length === 1 ? 'planet' : 'planets'} orbiting Nova`"></p>
            </div>
            <button class="nova-input" style="width:auto;padding:8px 14px;font-size:12px"
                    @click="triggerDemoLine()" :disabled="allAgents.length < 2">
              Simulate conversation
            </button>
          </div>

          <div x-show="allAgentsLoading" class="nova-glass" style="text-align:center;color:var(--text-secondary)">
            Loading agents…
          </div>

          <div x-show="!allAgentsLoading && allAgents.length === 0" class="nova-glass" style="text-align:center;color:var(--text-secondary)">
            <div class="nova-live-empty-sun"></div>
            <p style="margin-top:16px">No planets orbiting yet. Approve a pending planet in a galaxy to see it here.</p>
          </div>

          <svg x-show="!allAgentsLoading && allAgents.length > 0"
               class="nova-live-svg"
               viewBox="0 0 800 600"
               preserveAspectRatio="xMidYMid meet"
               role="img"
               aria-label="Solar-system visualization of active agents"
               x-effect="renderLiveSvg($el)">
            <defs class="nova-live-defs">
              <radialGradient id="nova-sun-gradient" cx="30%" cy="30%">
                <stop offset="0%" stop-color="#ffe08a" />
                <stop offset="100%" stop-color="#f5a623" />
              </radialGradient>
            </defs>

            <circle class="nova-live-ring" cx="400" cy="300" r="220" />

            <g class="nova-live-lines-group"></g>

            <g class="nova-live-sun">
              <circle cx="400" cy="300" r="24" fill="url(#nova-sun-gradient)" />
              <text x="400" y="303" class="nova-live-sun-label" text-anchor="middle">NOVA</text>
            </g>

            <g class="nova-live-planets-group"></g>
          </svg>
        </div>
      </template>

      <!-- AUDIT -->
      <template x-if="route.name === 'audit'">
        <div>
          <div class="nova-eyebrow">◉ AUDIT</div>
          <h1 class="nova-display" style="font-size:40px;margin:6px 0">Audit</h1>
          <p class="nova-subtitle" style="margin-bottom:20px" x-text="auditEvents.length + ' ' + (auditEvents.length === 1 ? 'event' : 'events') + ' in the last 7 days'"></p>

          <div class="nova-row" style="gap:12px;margin-bottom:20px;flex-wrap:wrap">
            <select class="nova-input" style="width:auto;min-width:200px" x-model="auditFilters.event" @change="loadAuditEvents()">
              <option value="">All event types</option>
              <optgroup label="Task lifecycle">
                <option value="task_queued">task_queued</option>
                <option value="task_classification_started">task_classification_started</option>
                <option value="task_classification_complete">task_classification_complete</option>
                <option value="task_quarantined">task_quarantined</option>
                <option value="task_dropped">task_dropped</option>
                <option value="task_started">task_started</option>
                <option value="task_broker_queued">task_broker_queued</option>
                <option value="task_completed">task_completed</option>
                <option value="task_failed">task_failed</option>
                <option value="task_error">task_error</option>
                <option value="task_expired">task_expired</option>
              </optgroup>
              <optgroup label="Messaging &amp; gating">
                <option value="message_received">message_received</option>
                <option value="message_parse_failed">message_parse_failed</option>
                <option value="gate_503">gate_503</option>
              </optgroup>
              <optgroup label="UCAN &amp; actor">
                <option value="ucan_verified">ucan_verified</option>
                <option value="ucan_failed">ucan_failed</option>
                <option value="ucan_renewed">ucan_renewed</option>
                <option value="ucan_renewal_failed">ucan_renewal_failed</option>
                <option value="key_rotation_detected">key_rotation_detected</option>
                <option value="actor_resolved">actor_resolved</option>
                <option value="actor_unknown">actor_unknown</option>
              </optgroup>
              <optgroup label="Schema &amp; injection">
                <option value="schema_valid">schema_valid</option>
                <option value="schema_invalid">schema_invalid</option>
                <option value="agent_output_schema_violation">agent_output_schema_violation</option>
                <option value="injection_clear">injection_clear</option>
                <option value="injection_pattern_match">injection_pattern_match</option>
                <option value="injection_detected">injection_detected</option>
                <option value="injection_suspected">injection_suspected</option>
                <option value="injection_pattern_clear">injection_pattern_clear</option>
                <option value="classifier_unavailable">classifier_unavailable</option>
              </optgroup>
              <optgroup label="Confirmation">
                <option value="confirm_requested">confirm_requested</option>
                <option value="confirm_approved">confirm_approved</option>
                <option value="confirm_denied">confirm_denied</option>
                <option value="confirm_timeout">confirm_timeout</option>
              </optgroup>
              <optgroup label="Delivery &amp; dead letter">
                <option value="delivery_success">delivery_success</option>
                <option value="delivery_transient_failure">delivery_transient_failure</option>
                <option value="delivery_permanent_failure">delivery_permanent_failure</option>
                <option value="delivery_exhausted">delivery_exhausted</option>
                <option value="dead_letter_written">dead_letter_written</option>
              </optgroup>
              <optgroup label="Broker replies">
                <option value="reply_broker_queued">reply_broker_queued</option>
                <option value="reply_delivered">reply_delivered</option>
                <option value="reply_acked">reply_acked</option>
                <option value="reply_reclaimed">reply_reclaimed</option>
                <option value="reply_dead_lettered">reply_dead_lettered</option>
                <option value="reply_sender_inactive">reply_sender_inactive</option>
              </optgroup>
              <optgroup label="Agent lifecycle">
                <option value="agent_registered">agent_registered</option>
                <option value="agent_approved">agent_approved</option>
                <option value="agent_rejected">agent_rejected</option>
                <option value="agent_discovered">agent_discovered</option>
              </optgroup>
              <optgroup label="System">
                <option value="quarantine_full">quarantine_full</option>
                <option value="redis_unavailable">redis_unavailable</option>
              </optgroup>
            </select>

            <select class="nova-input" style="width:auto;min-width:180px" x-model="auditFilters.tenantId">
              <option value="">All galaxies</option>
              <template x-for="g in galaxies" :key="g.id">
                <option :value="g.id" x-text="g.slug"></option>
              </template>
            </select>

            <input class="nova-input" style="width:auto;min-width:280px;font-family:var(--font-mono);font-size:12px"
                   placeholder="task id (uuid)" x-model.debounce.300ms="auditFilters.taskId" @input="loadAuditEvents()">

            <button class="nova-input" style="width:auto;padding:10px 16px" @click="loadAuditEvents()">
              Refresh
            </button>
          </div>

          <div x-show="auditLoading" class="nova-glass" style="text-align:center;color:var(--text-secondary)">
            Loading events…
          </div>

          <div x-show="auditError" class="nova-glass" style="text-align:center;color:var(--status-error)" x-text="auditError"></div>

          <div x-show="!auditLoading && !auditError && visibleAuditEvents.length === 0" class="nova-glass" style="text-align:center;color:var(--text-secondary)">
            No events match these filters.
          </div>

          <div x-show="!auditLoading && !auditError && visibleAuditEvents.length > 0" class="nova-audit-list">
            <div class="nova-audit-head">
              <span>Timestamp</span>
              <span>Event</span>
              <span>Galaxy</span>
              <span>Agent</span>
              <span>Task ID</span>
            </div>
            <template x-for="e in visibleAuditEvents" :key="e.eventId">
              <div>
                <div class="nova-audit-row" :class="auditExpanded === e.eventId && 'is-expanded'" @click="toggleAuditRow(e.eventId)">
                  <span class="nova-mono" x-text="e.timestamp.slice(0, 19).replace('T', ' ')"></span>
                  <span x-text="e.event"></span>
                  <span x-text="galaxySlug(e.tenantId)"></span>
                  <span class="nova-mono" x-text="e.agentId"></span>
                  <span class="nova-mono" x-text="e.taskId ? e.taskId.slice(0, 8) + '…' : ''"></span>
                </div>
                <div x-show="auditExpanded === e.eventId" class="nova-audit-expanded">
                  <pre class="nova-audit-metadata" x-text="JSON.stringify({ eventId: e.eventId, taskId: e.taskId, metadata: e.metadata }, null, 2)"></pre>
                </div>
              </div>
            </template>
          </div>

          <p x-show="!auditLoading && !auditError && visibleAuditEvents.length >= 50" class="nova-subtitle" style="margin-top:12px;text-align:center">
            Showing 50 most recent · refine filters for older events
          </p>
        </div>
      </template>

      <!-- SETTINGS -->
      <template x-if="route.name === 'settings'">
        <div>
          <div class="nova-eyebrow">◉ SETTINGS</div>
          <h1 class="nova-display" style="font-size:40px;margin:6px 0">Settings</h1>
          <p class="nova-subtitle" style="margin-bottom:24px">Security controls for the gate pipeline.</p>

          <div x-show="classifierLoading" class="nova-glass" style="text-align:center;color:var(--text-secondary)">
            Loading classifier settings…
          </div>

          <div x-show="classifierError" class="nova-glass" style="text-align:center;color:var(--status-error)" x-text="classifierError"></div>

          <template x-if="classifierSettings && !classifierLoading">
            <div class="nova-settings-grid" x-data="{
              mode: classifierSettings.mode,
              model: classifierSettings.model,
              failClosed: classifierSettings.failClosed,
              apiKey: '',
              clearApiKey: false,
              err: ''
            }" x-effect="
              mode = classifierSettings.mode;
              model = classifierSettings.model;
              failClosed = classifierSettings.failClosed;
              apiKey = '';
              clearApiKey = false;
            ">
              <section class="nova-settings-panel">
                <div class="nova-row" style="justify-content:space-between;align-items:flex-start;margin-bottom:18px">
                  <div>
                    <h2 style="margin:0 0 6px;font-size:22px;font-weight:500">Injection Classifier</h2>
                    <p class="nova-subtitle" style="margin:0">Pattern checks always run. AI classification runs only when enabled and a key is available.</p>
                  </div>
                  <span class="nova-pill"
                        :class="classifierSettings.aiEnabled ? 'nova-pill-active' : ''"
                        :style="!classifierSettings.aiEnabled ? 'color:var(--text-muted);border-color:var(--border)' : ''"
                        x-text="classifierSettings.aiEnabled ? 'AI on' : 'Pattern only'"></span>
                </div>

                <div class="nova-form-grid">
                  <div>
                    <label class="nova-label" for="classifier-mode">mode</label>
                    <select id="classifier-mode" class="nova-input" x-model="mode">
                      <option value="pattern_ai">Pattern + AI when key exists</option>
                      <option value="pattern_only">Pattern only</option>
                    </select>
                  </div>

                  <div>
                    <label class="nova-label" for="classifier-fail">AI failure behavior</label>
                    <select id="classifier-fail" class="nova-input" x-model="failClosed">
                      <option :value="true">Fail closed</option>
                      <option :value="false">Fail open</option>
                    </select>
                  </div>
                </div>

                <label class="nova-label" for="classifier-model" style="margin-top:16px">model</label>
                <input id="classifier-model" class="nova-input nova-mono" x-model="model" placeholder="claude-haiku-4-20250514">

                <div class="nova-settings-keybox">
                  <div>
                    <div class="nova-label">api key</div>
                    <div class="nova-row" style="gap:8px;flex-wrap:wrap">
                      <span class="nova-pill" :class="classifierSettings.apiKeySource !== 'none' ? 'nova-pill-active' : ''"
                            :style="classifierSettings.apiKeySource === 'none' ? 'color:var(--text-muted);border-color:var(--border)' : ''"
                            x-text="classifierKeyLabel()"></span>
                      <span class="nova-mono" x-show="classifierSettings.envKeyConfigured">Env key takes precedence over stored key.</span>
                    </div>
                  </div>

                  <label class="nova-label" for="classifier-key" style="margin-top:14px">replace stored key</label>
                  <input id="classifier-key" class="nova-input" type="password" autocomplete="off"
                         x-model="apiKey" :disabled="clearApiKey"
                         placeholder="sk-ant-…">

                  <label class="nova-check" style="margin-top:12px">
                    <input type="checkbox" x-model="clearApiKey" :disabled="classifierSettings.apiKeySource === 'env' && !classifierSettings.storedKeyConfigured">
                    <span>Clear stored key</span>
                  </label>
                </div>

                <p class="nova-error" x-show="err" x-text="err" style="margin-top:12px"></p>

                <div class="nova-row" style="margin-top:22px;justify-content:flex-end;gap:10px">
                  <button class="nova-input" style="width:auto;padding:10px 16px" @click="loadClassifierSettings()" :disabled="classifierSaving">Reset</button>
                  <button class="nova-cta" @click="(async () => {
                    err = '';
                    try { await saveClassifierSettings({ mode, model, failClosed: failClosed === true || failClosed === 'true', apiKey, clearApiKey }); }
                    catch (e) { err = e.message || 'Save failed'; }
                  })()" :disabled="classifierSaving || !model">
                    <span x-text="classifierSaving ? 'Saving…' : 'Save settings'"></span><span>→</span>
                  </button>
                </div>
              </section>

              <aside class="nova-settings-panel is-compact">
                <div class="nova-label">effective state</div>
                <div class="nova-settings-facts">
                  <div><span>Mode</span><strong x-text="classifierSettings.mode === 'pattern_ai' ? 'Pattern + AI' : 'Pattern only'"></strong></div>
                  <div><span>Provider</span><strong x-text="classifierSettings.provider"></strong></div>
                  <div><span>Model</span><strong class="nova-mono" x-text="classifierSettings.model"></strong></div>
                  <div><span>AI enabled</span><strong x-text="classifierSettings.aiEnabled ? 'yes' : 'no'"></strong></div>
                  <div><span>Failure</span><strong x-text="classifierSettings.failClosed ? 'fail closed' : 'fail open'"></strong></div>
                  <div><span>Key source</span><strong x-text="classifierSettings.apiKeySource"></strong></div>
                  <div><span>Updated</span><strong class="nova-mono" x-text="classifierSettings.updatedAt ? new Date(classifierSettings.updatedAt).toLocaleString() : 'not saved'"></strong></div>
                </div>
              </aside>
            </div>
          </template>
        </div>
      </template>

      </section><!-- /.nova-main -->

      <!-- CREATE GALAXY MODAL -->
      <template x-if="showCreateGalaxy">
        <div class="nova-modal-backdrop" @click.self="showCreateGalaxy = false">
          <div class="nova-modal" x-data="{ slug: '', name: '', plan: 'developer', err: '', busy: false, fieldErrs: {} }">
            <div class="nova-eyebrow">◉ NEW GALAXY</div>
            <h2 class="nova-display" style="font-size:32px;margin:8px 0 20px">Forge a galaxy.</h2>

            <label class="nova-label" for="g-slug">slug</label>
            <input id="g-slug" class="nova-input" :class="fieldErrs.slug ? 'is-error' : ''" x-model="slug" placeholder="acme-corp" pattern="[a-z0-9-]+">
            <p class="nova-error" x-show="fieldErrs.slug" x-text="fieldErrs.slug"></p>

            <label class="nova-label" for="g-name" style="margin-top:14px">display name</label>
            <input id="g-name" class="nova-input" :class="fieldErrs.name ? 'is-error' : ''" x-model="name" placeholder="ACME Corp">
            <p class="nova-error" x-show="fieldErrs.name" x-text="fieldErrs.name"></p>

            <label class="nova-label" for="g-plan" style="margin-top:14px">plan</label>
            <select id="g-plan" class="nova-input" x-model="plan">
              <option value="developer">Developer</option>
              <option value="pro">Pro</option>
              <option value="enterprise">Enterprise</option>
            </select>

            <p class="nova-error" x-show="err" x-text="err" style="margin-top:12px"></p>

            <div class="nova-row" style="margin-top:24px;justify-content:flex-end;gap:10px">
              <button class="nova-input" style="width:auto;padding:10px 16px" @click="showCreateGalaxy = false" :disabled="busy">Cancel</button>
              <button class="nova-cta" @click="(async () => {
                busy = true; err = ''; fieldErrs = {};
                try { await createGalaxy({ slug, name, plan }); }
                catch (e) {
                  if (e.details && e.details.length) {
                    for (const d of e.details) fieldErrs[d.field] = d.message;
                  } else { err = e.message || 'Create failed'; }
                } finally { busy = false; }
              })()" :disabled="busy || !slug || !name">
                <span x-text="busy ? 'Forging…' : 'Forge galaxy'"></span><span>→</span>
              </button>
            </div>
          </div>
        </div>
      </template>

      <!-- CREATE INVITE MODAL -->
      <template x-if="showCreateInvite">
        <div class="nova-modal-backdrop" @click.self="showCreateInvite = false">
          <div class="nova-modal" x-data="{ hint: '', ttl: 86400, note: '', err: '', busy: false }">
            <div class="nova-eyebrow">◉ NEW INVITE</div>
            <h2 class="nova-display" style="font-size:28px;margin:8px 0 20px">Invite a planet.</h2>

            <label class="nova-label" for="i-hint">agent id hint</label>
            <input id="i-hint" class="nova-input" x-model="hint" placeholder="agent_alpha" pattern="[a-z0-9_-]+" required>
            <p class="nova-subtitle" style="margin-top:4px;font-size:11px">The agentId the receiving runtime will register as. Invite is bound to this id — one invite per agent.</p>

            <label class="nova-label" for="i-ttl" style="margin-top:14px">ttl</label>
            <select id="i-ttl" class="nova-input" x-model.number="ttl">
              <option :value="3600">1 hour</option>
              <option :value="86400">24 hours</option>
              <option :value="7 * 86400">7 days</option>
            </select>

            <label class="nova-label" for="i-note" style="margin-top:14px">note (optional)</label>
            <input id="i-note" class="nova-input" x-model="note" placeholder="e.g. shared with ops team">

            <p class="nova-error" x-show="err" x-text="err" style="margin-top:12px"></p>

            <div class="nova-row" style="margin-top:24px;justify-content:flex-end;gap:10px">
              <button class="nova-input" style="width:auto;padding:10px 16px" @click="showCreateInvite = false" :disabled="busy">Cancel</button>
              <button class="nova-cta" @click="(async () => {
                busy = true; err = '';
                try { await createInvite({ agentIdHint: hint, ttlSeconds: ttl, note: note || undefined }); }
                catch (e) { err = (e.details && e.details[0]?.message) || e.message || 'Invite failed'; }
                finally { busy = false; }
              })()" :disabled="busy || !hint">
                <span x-text="busy ? 'Issuing…' : 'Issue invite'"></span><span>→</span>
              </button>
            </div>
          </div>
        </div>
      </template>

      <!-- INVITE ONE-TIME REVEAL -->
      <template x-if="revealedInvite">
        <div class="nova-modal-backdrop" @click.self="dismissReveal()">
          <div class="nova-modal" x-data="{ copied: false }" x-init="$nextTick(() => { const el = $refs.qr; el.innerHTML=''; new QRCode(el, { text: revealedInvite.token, width: 180, height: 180, colorDark: '#fff', colorLight: '#000' }); })">
            <div class="nova-eyebrow" style="color:var(--status-error)">◉ ONE-TIME TOKEN</div>
            <h2 class="nova-display" style="font-size:26px;margin:8px 0 8px">Share this now.</h2>
            <p class="nova-subtitle" style="margin-bottom:20px">This token is shown once. Save it or hand it to the planet operator now — a refresh will lose it.</p>

            <div x-ref="qr" style="display:flex;justify-content:center;margin-bottom:18px"></div>

            <div class="nova-glass nova-mono" style="word-break:break-all;font-size:11px;padding:12px" x-text="revealedInvite.token"></div>

            <div class="nova-mono" style="margin-top:10px" x-text="`jti: ${revealedInvite.jti} · expires: ${new Date(revealedInvite.expiresAt).toLocaleString()}`"></div>

            <div class="nova-row" style="margin-top:24px;justify-content:flex-end;gap:10px">
              <button class="nova-input" style="width:auto;padding:10px 16px" @click="navigator.clipboard.writeText(revealedInvite.token); copied = true; setTimeout(() => copied = false, 2000)">
                <span x-text="copied ? 'Copied ✓' : 'Copy token'"></span>
              </button>
              <button class="nova-cta" @click="dismissReveal()">
                <span>Dismiss</span>
              </button>
            </div>
          </div>
        </div>
      </template>

      <!-- APPROVE MODAL -->
      <template x-if="approveTarget">
        <div class="nova-modal-backdrop" @click.self="approveTarget = null">
          <div class="nova-modal" x-data="{
            tier: 1, allowedSkillsRaw: '*', expiry: 30, notes: '',
            busy: false, err: ''
          }" x-init="allowedSkillsRaw = (approveTarget.skills || []).map(s => s.id).join(', ') || '*'">
            <div class="nova-eyebrow">◉ APPROVE PLANET</div>
            <h2 class="nova-display" style="font-size:26px;margin:8px 0 6px" x-text="approveTarget.agentId"></h2>
            <div class="nova-mono" style="margin-bottom:20px;overflow-wrap:anywhere" x-text="approveTarget.did"></div>

            <label class="nova-label" for="a-tier">trust tier (1-3)</label>
            <select id="a-tier" class="nova-input" x-model.number="tier">
              <option :value="1">1 — basic</option>
              <option :value="2">2 — elevated</option>
              <option :value="3">3 — full</option>
            </select>

            <label class="nova-label" for="a-skills" style="margin-top:14px">allowed skills (comma-separated, or *)</label>
            <input id="a-skills" class="nova-input" x-model="allowedSkillsRaw" placeholder="query_knowledge, request_summary">

            <label class="nova-label" for="a-exp" style="margin-top:14px">ucan expiry (days)</label>
            <input id="a-exp" class="nova-input" type="number" min="1" max="365" x-model.number="expiry">

            <label class="nova-label" for="a-notes" style="margin-top:14px">notes (optional)</label>
            <input id="a-notes" class="nova-input" x-model="notes">

            <p class="nova-error" x-show="err" x-text="err" style="margin-top:12px"></p>

            <div class="nova-row" style="margin-top:24px;justify-content:flex-end;gap:10px">
              <button class="nova-input" style="width:auto;padding:10px 16px" @click="approveTarget = null" :disabled="busy">Cancel</button>
              <button class="nova-cta" @click="(async () => {
                busy = true; err = '';
                const skills = allowedSkillsRaw.split(',').map(s => s.trim()).filter(Boolean);
                try { await approve(approveTarget.agentId, { trustTier: tier, allowedSkills: skills, ucanExpiryDays: expiry, notes: notes || undefined }); }
                catch (e) { err = e.message || 'Approval failed'; }
                finally { busy = false; }
              })()" :disabled="busy">
                <span x-text="busy ? 'Approving…' : 'Approve'"></span><span>→</span>
              </button>
            </div>
          </div>
        </div>
      </template>

      <!-- AGENT DETAIL PANEL -->
      <aside class="nova-agent-detail" x-show="selectedAgent" x-cloak>
        <button class="nova-agent-detail-close" @click="closeAgentDetail()" aria-label="Close">×</button>

        <div class="nova-eyebrow">◉ AGENT</div>
        <h2 class="nova-display" style="font-size:28px;margin:8px 0 12px" x-text="selectedAgent?.name"></h2>

        <div class="nova-mono" style="margin-bottom:16px" x-text="selectedAgent?.agentId"></div>

        <div style="margin-bottom:16px">
          <div class="nova-label">galaxy</div>
          <a :href="`#/galaxy/${encodeURIComponent(galaxySlug(selectedAgent?.tenantId))}`"
             class="nova-pill"
             style="color:var(--text-secondary);border-color:var(--border);text-decoration:none"
             x-text="galaxySlug(selectedAgent?.tenantId)"></a>
        </div>

        <div x-show="selectedAgent?.did" style="margin-bottom:16px">
          <div class="nova-label">did</div>
          <div class="nova-mono" style="overflow-wrap:anywhere;font-size:11px" x-text="selectedAgent?.did"></div>
        </div>

        <div x-show="selectedAgent?.description" style="margin-bottom:16px">
          <div class="nova-label">description</div>
          <p class="nova-subtitle" style="margin:0" x-text="selectedAgent?.description"></p>
        </div>

        <div x-show="selectedAgent?.skills?.length > 0" style="margin-bottom:16px">
          <div class="nova-label" style="margin-bottom:8px">skills</div>
          <div style="display:flex;flex-direction:column;gap:10px">
            <template x-for="s in (selectedAgent?.skills || [])" :key="s.id">
              <div style="padding:10px;border:1px solid var(--border);border-radius:8px">
                <div style="color:#fff;font-weight:500" x-text="s.name"></div>
                <div class="nova-mono" style="font-size:10px;margin-top:2px" x-text="s.id"></div>
                <p x-show="s.description" class="nova-subtitle" style="margin:6px 0 0" x-text="s.description"></p>
              </div>
            </template>
          </div>
        </div>

        <div>
          <div class="nova-label" style="margin-bottom:8px">capabilities</div>
          <div class="nova-row" style="gap:14px;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:1px">
            <span class="nova-capability-indicator" :class="selectedAgent?.capabilities?.streaming && 'is-on'">streaming</span>
            <span class="nova-capability-indicator" :class="selectedAgent?.capabilities?.pushNotifications && 'is-on'">push</span>
            <span class="nova-capability-indicator" :class="selectedAgent?.capabilities?.stateTransitionHistory && 'is-on'">history</span>
          </div>
        </div>

        <!-- Broker inbox status -->
        <div style="margin-bottom:16px">
          <div class="nova-label" style="margin-bottom:8px">mode</div>
          <div x-show="!selectedAgentBroker && !selectedAgentBrokerError" class="nova-subtitle" style="margin:0;font-size:12px">Loading…</div>
          <div x-show="selectedAgentBrokerError" class="nova-subtitle" style="margin:0;font-size:12px;color:var(--status-error)" x-text="selectedAgentBrokerError"></div>
          <template x-if="selectedAgentBroker">
            <div>
              <span class="nova-pill"
                    :class="selectedAgentBroker.mode === 'broker' ? 'nova-pill-active' : ''"
                    :style="selectedAgentBroker.mode !== 'broker' ? 'color:var(--text-muted);border-color:var(--border)' : ''"
                    x-text="selectedAgentBroker.mode"></span>
              <template x-if="selectedAgentBroker.mode === 'broker'">
                <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
                  <div style="padding:10px;border:1px solid var(--border);border-radius:8px">
                    <div class="nova-label" style="margin-bottom:6px">task inbox</div>
                    <div style="font-size:11px;color:var(--text-secondary);line-height:1.7">
                      <div>depth: <span class="nova-mono" x-text="selectedAgentBroker.inbox.depth"></span></div>
                      <div>inflight: <span class="nova-mono" x-text="selectedAgentBroker.inbox.inflightCount"></span></div>
                      <div>oldest: <span class="nova-mono" x-text="formatAgeMs(selectedAgentBroker.inbox.oldestInflightAgeMs)"></span></div>
                    </div>
                  </div>
                  <div style="padding:10px;border:1px solid var(--border);border-radius:8px">
                    <div class="nova-label" style="margin-bottom:6px">reply inbox</div>
                    <div style="font-size:11px;color:var(--text-secondary);line-height:1.7">
                      <div>depth: <span class="nova-mono" x-text="selectedAgentBroker.replyInbox.depth"></span></div>
                      <div>inflight: <span class="nova-mono" x-text="selectedAgentBroker.replyInbox.inflightCount"></span></div>
                      <div>oldest: <span class="nova-mono" x-text="formatAgeMs(selectedAgentBroker.replyInbox.oldestInflightAgeMs)"></span></div>
                    </div>
                  </div>
                </div>
              </template>
              <div style="margin-top:8px">
                <button class="nova-input" style="width:auto;padding:6px 12px;font-size:11px" @click="loadSelectedBrokerStatus()">refresh</button>
              </div>
            </div>
          </template>
        </div>
      </aside>

    </section>

    <!-- Toasts -->
    <div class="nova-toast-stack">
      <template x-for="t in toasts" :key="t.id">
        <div class="nova-toast" :class="t.kind === 'err' ? 'is-err' : 'is-ok'" x-text="t.text"></div>
      </template>
    </div>

  </main>

  <script type="module" src="/js/app.js"></script>
  <script defer src="/vendor/alpine.min.js"></script>
  <script defer src="/vendor/qrcode.min.js"></script>
</body>
</html>
