services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  a2a-server:
    build:
      context: .
      dockerfile: Dockerfile.a2a-server
    init: true
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data:rw
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_ROOT=/app/data
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    stop_grace_period: 15s

  gate-service:
    build:
      context: .
      dockerfile: Dockerfile.gate-service
    init: true
    volumes:
      - ./data:/app/data:rw
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_ROOT=/app/data
      - GATE_PORT=3002
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    stop_grace_period: 10s

  agent-connector:
    build:
      context: .
      dockerfile: Dockerfile.agent-connector
    init: true
    volumes:
      - ./data:/app/data:rw
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_ROOT=/app/data
      - HEALTH_PORT=3003
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    stop_grace_period: 35s

  admin-api:
    build:
      context: .
      dockerfile: Dockerfile.admin-api
    init: true
    ports:
      - "127.0.0.1:3005:3005"
    volumes:
      - ./data:/app/data:rw
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_ROOT=/app/data
      - PORT=3005
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN must be set}
      - A2A_HEALTH_URL=http://a2a-server:3001/health
      - GATE_HEALTH_URL=http://gate-service:3002/health
      - CONNECTOR_HEALTH_URL=http://agent-connector:3003/health
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    stop_grace_period: 10s

  caddy:
    image: caddy:2.8-alpine
    init: true
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - a2a-server
      - admin-api

volumes:
  redis-data:
  caddy-data:
  caddy-config:
