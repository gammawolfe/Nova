# .github/workflows/ci.yml
#
# Runs on every PR targeting main and on every push to main itself (so a
# protected-branch policy can require this check). Single job, single
# runner — lint / build / test are fast enough that splitting them buys
# nothing and would only add cache-restore overhead.
#
# Stops on the first failing step so the failure is unambiguous in the
# checks UI. Docker builds, acceptance scripts, and the LLM-classifier
# integration tests are intentionally out of scope here — they need
# external services (Redis, mocks) and are better suited to a separate
# `acceptance.yml` once they're stabilised.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-flight run for the same ref when a new commit lands.
# Prevents stacked queues on busy PRs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-lint:
    name: build · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (tsc --build)
        run: npm run build

      - name: Test (vitest)
        run: npm test
